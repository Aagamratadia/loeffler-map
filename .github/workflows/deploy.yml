name: Deploy to Vercel/Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Train/update ML model if dataset changes
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_backend/requirements.txt

      # Optional: Train model if data is available
      - name: Train model (if data exists)
        run: |
          if [ -f "data/antihypertensive_dataset_expanded.csv" ]; then
            python scripts/train_model.py --data ./data/antihypertensive_dataset_expanded.csv
            echo "✓ Model trained"
          else
            echo "ℹ️ No training data found, skipping model training"
          fi

      # Commit trained model if it changed
      - name: Commit model updates
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          
          if git diff --quiet scripts/models/; then
            echo "No model changes"
          else
            git add scripts/models/
            git commit -m "chore: update ML model weights" || true
            git push
          fi

      # Deploy to Vercel
      - name: Deploy to Vercel
        uses: vercel/action@master
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          production: true
        if: github.ref == 'refs/heads/main'

      # Or deploy to Railway (uncomment if using Railway)
      # - name: Deploy to Railway
      #   run: |
      #     npm i -g @railway/cli
      #     railway up --detach
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
